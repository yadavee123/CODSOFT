<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Tic-Tac-Toe AI</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color:#fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .game-container {
      text-align: center;
      background:#2a2a3d;
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    .status {
      margin: 10px 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 15px 0;
    }

    .cell {
      width: 90px;
      height: 90px;
      background: #3a3a55;
      border-radius: 10px;
      font-size: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .cell:hover {
      background: #50507a;
    }

    .cell.taken {
      cursor: not-allowed;
    }

    .win-cell {
      background:#4caf50 !important;
    }

    .draw-cell {
      background: #ff9800 !important;
    }

    .disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    .controls {
      margin-top: 10px;
    }

    select, button {
      margin: 5px;
      padding: 6px 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
    }

    button {
      background: #00adb5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #00939a;
    }

    .scoreboard {
      margin-top: 10px;
      font-size: 13px;
      display: flex;
      justify-content: space-around;
    }

    .thinking {
      font-size: 12px;
      opacity: 0;
      transition: 0.3s;
    }

    .thinking.visible {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="game-container">

    <h1>♟ Tic-Tac-Toe AI</h1>

    <div id="status-text" class="status">Loading...</div>
    <div id="thinking" class="thinking">AI is thinking...</div>

    <div class="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
      <select id="mode-toggle">
        <option value="ai">Play vs AI</option>
        <option value="pvp">Player vs Player</option>
      </select>

      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard" selected>Hard (Unbeatable)</option>
      </select>

      <br/>

      <button id="restart-btn">Restart Game</button>
    </div>

    <div class="scoreboard">
      <div>X: <span id="score-x">0</span></div>
      <div>O: <span id="score-o">0</span></div>
      <div>Draw: <span id="score-draw">0</span></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
